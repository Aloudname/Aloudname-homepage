<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>页面跳转中...</title>
  <script>
    // GitHub Pages SPA history mode fallback
    // 将 404 页面重定向到 index.html，通过 sessionStorage 传递原始路径
    (function() {
      var path = sessionStorage.getItem('redirect');
      var currentPath = location.pathname + location.search + location.hash;

      // 避免无限循环
      if (currentPath === path) {
        // 已经是重定向后的路径，替换为根路径
        sessionStorage.removeItem('redirect');
        path = '/';
      }

      if (currentPath !== '/' && currentPath !== '/index.html') {
        sessionStorage.setItem('redirect', currentPath);
        location.replace('/' + '?' + encodeURIComponent(currentPath.slice(1)));
      }
    })();
  </script>
</head>
<body>
  <p>正在跳转...</p>
</body>
</html>
